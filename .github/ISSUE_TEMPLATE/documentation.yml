name: Documentation
description: Report missing, unclear, or incorrect documentation
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Where is the documentation issue?
      description: File, page, or section affected (e.g. README.md, docs/setup.md).
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type of issue
      options:
        - Missing documentation
        - Outdated / incorrect content
        - Unclear explanation
        - Typo / formatting
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: What's wrong, and what should it say instead?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix (optional)
